<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="og:title" content="Micro-habit Streaks - Build and Maintain Your Micro-Habits">

        <title>Micro-habit Streaks</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="design-system.css">
        <link rel="stylesheet" href="../Activity/Activity.css">

    <body>
        <main class="container">
            <!-- Header Section (carries the Logo, title and notifications icon)-->

                <button class="burger-icon">

                            <li><a href="My_commitments"><button class="top-buttons">Commitments</button></a></li>
                            <li><a href="Performance"><button class="top-buttons">Performance</button></a></li>
                            <li><a href="Overview"><button class="top-buttons">Overview</button></a></li>
                            <li><a href="Ways"><button class="top-buttons">Workarounds</button></a></li>
                        </ul>
                    </nav>
                </div>
                <div class="notifications-section">
                    <span class="notification-section">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            <path d="M20 21v-2a4 4 0 0 0-3-3.87"/>

            </div>
            <div class="vertical-navbar">
                <nav>
                    <ul class="vertical-navbar-links">
                        <li><a href="#" class="vertical-navbar-link" data-page="home">Home</a></li> <!--Face of the application, holds the introductory part of who we are-->
                        <li><a href="#" class="vertical-navbar-link" data-page="activity">Activity</a></li> <!--Outlines the type of activities one has planned to carry out-->

                        <li><a href="#" class="vertical-navbar-link" data-page="settings">Settings</a></li> <!--Offers a few tweak options to the user, to feat their desired appearance of the app-->

                        <li><a href="/Login/login.html" class="vertical-navbar-link" data-page="logout">Logout</a></li> <!--Guides ea user to logging out-->
